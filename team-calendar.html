<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Calendar Mockup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid p-3 p-xl-4">
    <div class="app-shell">
      <div class="title-strip">CS Engineer - 2026.3.0.52 - Team Calendar</div>

      <div class="menu-strip border-bottom">
        <ul class="nav">
          <li class="nav-item"><button class="nav-link" type="button">Tools</button></li>
          <li class="nav-item"><button class="nav-link" type="button">Resources</button></li>
          <li class="nav-item"><button class="nav-link" type="button">Reports</button></li>

          <li class="nav-item"><button class="nav-link" type="button">Help</button></li>
        </ul>
      </div>
      <div class="ribbon border-bottom">
        <div class="ribbon-group">
          <button class="tool-btn" type="button"><i class="bi bi-calendar-plus text-success tool-icon"></i><span>New<br>Event</span></button>
          <button class="tool-btn" type="button"><i class="bi bi-calendar-x text-danger tool-icon"></i><span>Delete<br>Event</span></button>
          <button class="tool-btn" type="button"><i class="bi bi-calendar-check text-primary tool-icon"></i><span>Approve</span></button>
        </div>
        <div class="ribbon-group border-0 pe-0 me-0">
          <button class="tool-btn" type="button"><i class="bi bi-arrow-repeat text-secondary tool-icon"></i><span>Refresh</span></button>
          <button class="tool-btn" type="button"><i class="bi bi-search text-dark tool-icon"></i><span>Search</span></button>
        </div>
      </div>

        <h1 class="h5 mb-3">Team Calendar</h1>
        <div class="content-placeholder d-flex align-items-center justify-content-center">
          <p class="text-muted mb-0">Calendar mockup content area</p>
        </div>
      </div>

        <ul class="nav nav-tabs">
          <li class="nav-item"><a class="nav-link" href="./project-list.html">Project List</a></li>
